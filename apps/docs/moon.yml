---
$schema: "file://../../.moon/cache/schemas/project.json"

language: typescript
layer: application

toolchains:
  default: ["javascript", "bun"]

tasks:
  dev:
    command: "bun run dev"
    options:
      runInCI: false

  build:
    command: "bun run build"
    inputs:
      - "content/**/*"
      - "package.json"
      - "press.config.tsx"
      - "source.config.ts"
      - "tsconfig.json"
      - "waku.config.ts"
    outputs:
      - "dist/public"

  typecheck:
    command: "bun run typecheck"
    inputs:
      - "package.json"
      - "press.config.tsx"
      - "source.config.ts"
      - "tsconfig.json"
      - "waku.config.ts"

  test:
    command: "bun test"

  serve:
    dependsOn: ["build"]
    command: "bunx serve ./dist/public"
    options:
      runInCI: false

  publish:
    dependsOn: ["build"]
    options:
      cache: false
    command: "bash .moon/tasks/publish"
