---
language: typescript
layer: application

toolchains:
  default: ["javascript", "bun"]

tasks:
  lint:
    command: "bunx tsc --noEmit"

  test:
    command: "bun test"

  typecheck:
    command: "bunx tsc --noEmit"

  e2e:
    script: |
      set -euo pipefail
      tmp="$(mktemp -d)"
      trap 'rm -rf "$tmp"' EXIT
      TMPDIR="$tmp" bats ./e2e/*.bats.sh

  build:
    script: |
      set -euo pipefail
      mkdir -p ./dist
      bun build ./src/index.ts --compile --target=bun-linux-x64 \
        --outfile=./dist/boxfiles-linux-x64
      bun build ./src/index.ts --compile --target=bun-linux-arm64 \
        --outfile=./dist/boxfiles-linux-arm64
      bun build ./src/index.ts --compile --target=bun-darwin-x64 \
        --outfile=./dist/boxfiles-darwin-x64
      bun build ./src/index.ts --compile --target=bun-darwin-arm64 \
        --outfile=./dist/boxfiles-darwin-arm64
      bun build ./src/index.ts --compile --target=bun-windows-x64 \
        --outfile=./dist/boxfiles-windows-x64.exe
    outputs:
      - "./dist/boxfiles-linux-x64"
      - "./dist/boxfiles-linux-arm64"
      - "./dist/boxfiles-darwin-x64"
      - "./dist/boxfiles-darwin-arm64"
      - "./dist/boxfiles-windows-x64.exe"

  publish:
    type: run
    deps:
      - "~:build"
      - "docs:generate-version-manifest"
    script: |
      set -euo pipefail

      publish_tag="${PUBLISH_TAG:-}"
      if [ -z "${publish_tag}" ]; then
        echo "ERROR: PUBLISH_TAG is required (expected: latest or next)." >&2
        exit 1
      fi

      eval "$("${MOON_WORKSPACE_ROOT}/.moon/tasks/generate-publish-git-tag" "${publish_tag}" ".")"
      release_tag="${PUBLISH_GIT_TAG}"

      case "${publish_tag}" in
        latest)
          if ! gh release view "${release_tag}" >/dev/null 2>&1; then
            echo "ERROR: unable to find GitHub release '${release_tag}' for @boxfiles/cli version ${PUBLISH_VERSION}." >&2
            exit 1
          fi
          ;;
        next)
          target_ref="${GITHUB_SHA:-HEAD}"

          git tag -f "${release_tag}" "${target_ref}"
          git push origin "refs/tags/${release_tag}" --force

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release edit "${release_tag}" \
              --title "Boxfiles CLI ${PUBLISH_VERSION}" \
              --notes "Automated prerelease build from ${target_ref}." \
              --prerelease
          else
            gh release create "${release_tag}" \
              --title "Boxfiles CLI ${PUBLISH_VERSION}" \
              --notes "Automated prerelease build from ${target_ref}." \
              --prerelease \
              --latest=false \
              --verify-tag
          fi
          ;;
      esac

      gh release upload "${release_tag}" \
        ./dist/boxfiles-linux-x64 \
        ./dist/boxfiles-linux-arm64 \
        ./dist/boxfiles-darwin-x64 \
        ./dist/boxfiles-darwin-arm64 \
        ./dist/boxfiles-windows-x64.exe \
        --clobber

      moon run docs:upload-version-manifest
    outputs:
      - "./dist/boxfiles-linux-x64"
      - "./dist/boxfiles-linux-arm64"
      - "./dist/boxfiles-darwin-x64"
      - "./dist/boxfiles-darwin-arm64"
      - "./dist/boxfiles-windows-x64.exe"

  start:
    command: "bun run src/index.ts"
    options:
      runInCI: false
