---
language: typescript
layer: application

toolchains:
  default: ["javascript", "bun"]

tasks:
  lint:
    command: "bunx tsc --noEmit"

  test:
    command: "bun test"

  typecheck:
    command: "bunx tsc --noEmit"

  e2e:
    script: |
      set -euo pipefail
      tmp="$(mktemp -d)"
      trap 'rm -rf "$tmp"' EXIT
      TMPDIR="$tmp" bats ./e2e/*.bats.sh

  build:
    script: |
      set -euo pipefail
      mkdir -p ./dist
      bun build ./src/index.ts --compile --target=bun-linux-x64 \
        --outfile=./dist/boxfiles-linux-x64
      bun build ./src/index.ts --compile --target=bun-linux-arm64 \
        --outfile=./dist/boxfiles-linux-arm64
      bun build ./src/index.ts --compile --target=bun-darwin-x64 \
        --outfile=./dist/boxfiles-darwin-x64
      bun build ./src/index.ts --compile --target=bun-darwin-arm64 \
        --outfile=./dist/boxfiles-darwin-arm64
      bun build ./src/index.ts --compile --target=bun-windows-x64 \
        --outfile=./dist/boxfiles-windows-x64.exe
    outputs:
      - "./dist/boxfiles-linux-x64"
      - "./dist/boxfiles-linux-arm64"
      - "./dist/boxfiles-darwin-x64"
      - "./dist/boxfiles-darwin-arm64"
      - "./dist/boxfiles-windows-x64.exe"

  publish:
    deps:
      - "~:build"
      - "docs:generate-version-manifest"
    script: |
      set -euo pipefail

      publish_tag="${PUBLISH_TAG:-}"
      version="$(jq -r '.version' package.json)"
      release_tag=""

      case "${publish_tag}" in
        latest)
          candidate_tags=(
            "apps/cli-v${version}"
            "cli-v${version}"
            "@boxfiles/cli-v${version}"
            "v${version}"
          )

          for candidate_tag in "${candidate_tags[@]}"; do
            if gh release view "${candidate_tag}" >/dev/null 2>&1; then
              release_tag="${candidate_tag}"
              break
            fi
          done

          if [ -z "${release_tag}" ]; then
            echo "ERROR: unable to find GitHub release for @boxfiles/cli version ${version}." >&2
            echo "Tried: ${candidate_tags[*]}" >&2
            exit 1
          fi
          ;;
        next)
          release_tag="boxfiles-cli-next"
          target_ref="${GITHUB_SHA:-HEAD}"

          git tag -f "${release_tag}" "${target_ref}"
          git push origin "refs/tags/${release_tag}" --force

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release edit "${release_tag}" \
              --title "Boxfiles CLI next" \
              --notes "Automated prerelease build from ${target_ref}." \
              --prerelease
          else
            gh release create "${release_tag}" \
              --title "Boxfiles CLI next" \
              --notes "Automated prerelease build from ${target_ref}." \
              --prerelease \
              --latest=false \
              --verify-tag
          fi
          ;;
        *)
          echo "ERROR: unsupported PUBLISH_TAG='${publish_tag:-unset}' (expected: latest or next)." >&2
          exit 1
          ;;
      esac

      gh release upload "${release_tag}" \
        ./dist/boxfiles-linux-x64 \
        ./dist/boxfiles-linux-arm64 \
        ./dist/boxfiles-darwin-x64 \
        ./dist/boxfiles-darwin-arm64 \
        ./dist/boxfiles-windows-x64.exe \
        --clobber

      moon run docs:upload-version-manifest
    outputs:
      - "./dist/boxfiles-linux-x64"
      - "./dist/boxfiles-linux-arm64"
      - "./dist/boxfiles-darwin-x64"
      - "./dist/boxfiles-darwin-arm64"
      - "./dist/boxfiles-windows-x64.exe"

  start:
    command: "bun run src/index.ts"
    options:
      runInCI: false
