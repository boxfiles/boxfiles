---
$schema: "file://../../.moon/cache/schemas/project.json"
dependsOn:
  - core
  - plugin

language: typescript
layer: library

tags:
  - npm-publish

toolchains:
  default: ["javascript", "bun"]

tasks:
  lint:
    command: "bunx tsc --noEmit"

  typecheck:
    command: "bunx tsc --noEmit"

  build:
    command: "bunx tsc --noEmit"

  test:
    command: "bun test"

  publish:
    deps:
      - "~:npm-publish"
    command: noop
