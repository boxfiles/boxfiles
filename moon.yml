---
$schema: "file://./.moon/cache/schemas/project.json"

tasks:
  lint:
    command: "moon run :lint --affected"
  test:
    command: "moon run :test --affected"
  build:
    command: "moon run :build --affected"
  typecheck:
    command: "moon run :typecheck --affected"

  playwright:
    command: playwright-cli

  demoe2e:
    inputs:
      - "apps/e2e/**"
      - "Containerfile"
    script: |
      set -euo pipefail
      podman build -t boxfiles-demo-e2e -f Containerfile .
      podman run --rm boxfiles-demo-e2e
